name: GitHub Metrics
on:
  schedule: [{cron: "0 * * * *"}] # Runs every hour
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: codezaura
          template: classic
          base: header, community, repositories, metadata
          config_timezone: UTC
